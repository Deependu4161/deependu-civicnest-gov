{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 54px);display:flex;align-items:center;justify-content:center;padding:40px 20px;background:linear-gradient(135deg,var(--n900) 0%,#1a1133 40%,#091322 100%);">
  <div style="width:100%;max-width:420px;">
    <div style="background:rgba(255,255,255,.03);border:1px solid rgba(167,139,250,.15);border-radius:20px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.4);">
      <div style="padding:32px 32px 24px;border-bottom:1px solid rgba(255,255,255,.06);text-align:center;">
        <div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--n600),var(--n400));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;box-shadow:0 8px 24px rgba(109,40,217,.4);">🏠</div>
        <div style="font-size:22px;font-weight:800;color:#fff;margin-bottom:4px;letter-spacing:-.03em;">Welcome back</div>
        <div style="font-size:13px;color:rgba(255,255,255,.4);">Sign in to your TenantPro account</div>
      </div>
      <div style="padding:28px 32px;">
        <form method="post">{% csrf_token %}
          <div class="form-group">
            <label class="form-label" style="color:rgba(255,255,255,.5);">Username</label>
            <input type="text" name="username" class="form-ctrl" placeholder="Enter username" required autofocus style="background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1);color:#fff;">
          </div>
          <div class="form-group">
            <label class="form-label" style="color:rgba(255,255,255,.5);">Password</label>
            <input type="password" name="password" class="form-ctrl" placeholder="Enter password" required style="background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1);color:#fff;">
          </div>
          <button type="submit" class="btn-tp btn-primary w-100 justify-content-center" style="font-size:14.5px;padding:12px;margin-top:4px;">Sign In <i class="fa fa-arrow-right" style="font-size:11px;"></i></button>
        </form>
        <div style="text-align:center;margin-top:18px;font-size:13px;color:rgba(255,255,255,.35);">
          No account? <a href="/accounts/register/" style="color:var(--n300);font-weight:700;">Create one free</a>
        </div>
      </div>
    </div>
  </div>
</div>
<style>.form-ctrl::placeholder{color:rgba(255,255,255,.25)!important;}.form-ctrl:focus{background:rgba(255,255,255,.09)!important;border-color:var(--n400)!important;}</style>
{% endblock %}
